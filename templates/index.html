<!DOCTYPE html>
<html>
<head>
    <title>FinPath AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-center text-primary mb-2">
            FinPath AI
        </h1>

        <p class="text-center text-muted">
            Smart Personal Finance Advisor
        </p>

        <p class="text-center text-secondary mb-4">
            Plan • Invest • Grow
        </p>

        <form action="/result" method="POST">

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" name="age" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Risk Preference</label>

                <select name="risk_preference" class="form-control" required>
                    <option value="">Select Risk Preference</option>
                    <option value="Conservative">Conservative</option>
                    <option value="Moderate">Moderate</option>
                    <option value="Aggressive">Aggressive</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Monthly Income (₹)</label>
                <input type="number" name="income" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Monthly Expenses (₹)</label>
                <input type="number" name="expenses" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Current Savings (₹)</label>
                <input type="number" name="savings" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Goal Amount (₹)</label>
                <input type="number" name="goal_amount" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Goal Duration (Years)</label>
                <input type="number" name="goal_years" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Analyze Financial Health
            </button>

        </form>

    </div>

</div>

</body>
</html>
